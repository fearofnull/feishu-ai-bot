version: '3.8'

services:
  feishu-bot-web-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feishu-bot-web-admin
    restart: unless-stopped
    
    # 端口映射
    ports:
      - "5000:5000"
    
    # 环境变量（从 .env 文件加载）
    env_file:
      - .env
    
    # 也可以直接指定环境变量
    environment:
      - ENABLE_WEB_ADMIN=true
      - WEB_ADMIN_PORT=5000
      - WEB_ADMIN_HOST=0.0.0.0
    
    # 数据卷挂载（持久化会话数据和日志）
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # 如果需要访问本地代码仓库（CLI 功能）
      # - /path/to/your/project:/workspace:ro
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    # 网络配置
    networks:
      - feishu-bot-network

networks:
  feishu-bot-network:
    driver: bridge
